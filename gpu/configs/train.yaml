# ============================================================================
# YOLOv8 training configuration (GPU: NVIDIA CUDA or AMD ROCm)
# ============================================================================
# Outputs go to <output_dir>/<run_name>/train[i]/
#   weights/best.pt, weights/last.pt, checkpoints/, plotes/, logs/,
#   history.csv, config_used.yaml

run_name: yolov8
output_dir: runs
device: cuda          # 'cuda' works for both NVIDIA (CUDA) and AMD (ROCm)
seed: 0
log_interval: 10      # log the train metrics every N steps

dataset:
  # A dataset path can be a .zip archive or a plain folder. Both must
  # contain images/, labels/ and a data.yaml with a `names:` list.
  train_path: /path/to/dataset/train.zip
  test_path: /path/to/dataset/test.zip

  # Switch to pre-built HDF5 files (see ylbuild and hdf5.yaml).
  use_hdf5: false
  train_h5: data/train.h5
  test_h5: data/test.h5

  # Pre-flight scan: drop corrupt or invalid entries up front. The
  # result is cached in <name>.cache.json next to the dataset.
  validate: true
  cache: true

  max_train_samples: null   # null = use all; or an integer cap
  max_test_samples: null
  val_prob: 0.5             # fraction of test used for per-epoch validation
  image_size: 640

  # Fallback class names when the dataset has no data.yaml.
  class_names: null

  augment:
    enabled: true
    # HSV color jitter
    hsv_h: 0.015
    hsv_s: 0.7
    hsv_v: 0.4
    # Geometric transforms
    degrees: 0.0
    translate: 0.1
    scale: 0.5
    shear: 0.0
    perspective: 0.0
    # Flips
    flip_lr: 0.5
    flip_ud: 0.0
    # Mosaic / MixUp / Cutout
    mosaic: 1.0
    mixup: 0.0
    cutout: 0.0
    cutout_n_max: 4
    cutout_size_max: 0.25
    # Pixel effects
    blur: 0.0
    noise: 0.0
    grayscale: 0.0
    # Turn off mosaic and mixup on the last N epochs (0 = never)
    close_mosaic: 10

model:
  version: n                  # 'n' | 's' | 'm' | 'l' | 'x'
  # Start a NEW training from these weights (fine tuning / transfer).
  # Ignored when a checkpoint resume happens (resume has priority).
  pretrained_weights: null
  freeze_feature_layers: false

optimization:
  epochs: 100
  batch_size: 16
  num_workers: 4
  optimizer: sgd              # 'sgd' | 'adam' | 'adamw'
  max_lr: 0.01
  min_lr: 0.0001
  momentum: 0.937
  weight_decay: 0.0005
  scheduler: cosine           # 'cosine' | 'linear'
  warmup_epochs: 3.0
  warmup_momentum: 0.8
  warmup_bias_lr: 0.1
  grad_clip: 10.0
  grad_accum: 1               # gradient accumulation micro batches
  amp: true                   # mixed precision on CUDA
  ema: true
  ema_decay: 0.9999
  ema_tau: 2000.0
  patience: 0                 # early stopping (0 = disabled)
  cudnn_benchmark: true

loss:
  box_gain: 7.5
  cls_gain: 0.5
  dfl_gain: 1.5

checkpoint:
  # Save a checkpoint every N optimizer steps (train) or batches
  # (val / test). Allows a resume in the middle of an epoch.
  ckpt_step: 200
  max_checkpoint: 5
  # Reuse the highest numbered run folder with a checkpoint.
  resume: true
  best_metric: map50          # map50 | map | precision | recall

validation:
  interval: 1                 # validate every N epochs
  conf_threshold: 0.001
  iou_threshold: 0.7
